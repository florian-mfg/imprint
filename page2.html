<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>IMPRINT STYLING</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.1/p5.min.js"></script>
  <link rel="stylesheet" href="style2.css">
  <link rel="icon" type="image/png" href="assets/TT-Handjet-Printer.png">
</head>
<body>

<div id="layout">

  <div id="controls">
    <header class="Headline">
      <a class="logo-link" href="index.html">
        <img src="assets/TT-Imprint-Logo-2.jpg" alt="Imprint" class="logo-image">
      </a>
      <h2>Imprint is an interactive tool for experimental typography which simulates industrial printing on various surfaces. <br> Imperfections and user input explore typography as a physical process. <br><br> © Meisner Florian Gestaltung</h2>
    </header>
  </div>

  <div id="canvas-container">
    <div id="canvas-wrapper">
      <img class="canvas-corner corner-top-left" src="assets/TT-Buttons-Corner-top-left.svg" alt="">
      <img class="canvas-corner corner-top-right" src="assets/TT-Buttons-Corner-top-right.svg" alt="">
      <img class="canvas-corner corner-bottom-left" src="assets/TT-Buttons-Corner-buttom-left.svg" alt="">
      <img class="canvas-corner corner-bottom-right" src="assets/TT-Buttons-Corner-buttom-right.svg" alt="">
    </div>
  </div>

</div>

<script src="sketch.js"></script>
</body>
</html>
